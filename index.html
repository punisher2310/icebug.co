<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icebug\Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>

    <div id="sowModal" class="sow-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Project Scope & Terms</h3>
                <span class="close-btn" onclick="closeSOW()">&times;</span>
            </div>
            <iframe id="sowFrame" src=""></iframe>
        </div>
    </div>

    <section id="pricing" class="pricing-section">
        <div class="pricing-grid">
            <div class="bento">
                <h3>The Essential</h3>
                <p class="monthly-fee">₹10,000</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="openSOW('https://drive.google.com/file/d/1RK078bQ1krub-wAkhsWe0tS7j2dBdRDM/view?usp=sharing')" class="btn-secondary">View Scope</button>
                    <a href="https://wa.me/919369555426?text=Hi%20Icebug!%20I%20want%20to%20sign%20the%20Essential%20Plan%20SOW." class="btn-primary" style="text-align: center;">Sign SOW 🔒</a>
                </div>
            </div>

            <div class="bento premium-card">
                <h3>The Premium</h3>
                <p class="monthly-fee">₹25,000</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="openSOW('https://drive.google.com/file/d/1Hwpm5MHlkGTXL4AWT1HB5XuQ0wbnmxs6/view?usp=sharing')" class="btn-secondary">View Scope</button>
                    <a href="https://wa.me/919369555426?text=Hi%20Icebug!%20I%20want%20to%20sign%20the%20Premium%20Plan%20SOW." class="btn-primary" style="text-align: center;">Sign SOW 🔒</a>
                </div>
            </div>

            <div class="bento">
                <h3>The Bespoke</h3>
                <p class="monthly-fee">₹50,000+</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="openSOW('https://drive.google.com/file/d/1gRANTvKd6nrJm2L4yhcrgNKX_wY4PJnF/view?usp=sharing')" class="btn-secondary">View Scope</button>
                    <a href="https://wa.me/919369555426?text=Hi%20Icebug!%20I%20want%20to%20discuss%20the%20Bespoke%20Plan." class="btn-primary" style="text-align: center;">Discuss SOW 🔒</a>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
