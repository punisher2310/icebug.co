<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icebug\Studio | Premium Digital Experiences</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CORE STYLES --- */
        html { scroll-behavior: smooth; }
        body { overflow-x: hidden; width: 100%; cursor: none; } 

        /* CUSTOM CURSOR */
        .cursor {
            width: 20px; height: 20px; border: 1px solid #4f46e5; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease, background 0.3s ease;
            transform: translate(-50%, -50%);
        }

        /* MODAL STYLES */
        .portal-modal, .privacy-modal, .sow-modal {
            display: none; position: fixed; z-index: 5000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.96);
            backdrop-filter: blur(15px); justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .portal-content, .privacy-content, .modal-container {
            background: #0a0a0a; color: white; padding: 40px; border-radius: 4px; 
            width: 100%; max-width: 550px; border: 1px solid #222; position: relative;
            transform: translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .portal-modal.active, .privacy-modal.active, .sow-modal.active { display: flex; }
        .active .portal-content, .active .privacy-content { transform: translateY(0); }
        
        .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .status-badge { background: #16a34a; color: white; padding: 4px 12px; font-size: 0.7rem; font-family: 'Space Mono'; }
        .portal-detail { margin: 18px 0; font-size: 0.95rem; color: #888; font-family: 'Space Mono'; display: flex; justify-content: space-between; }
        .portal-detail strong { color: white; }
        .close-portal { cursor: pointer; font-size: 14px; color: #666; font-family: 'Space Mono'; letter-spacing: 2px; }
        .close-portal:hover { color: #4f46e5; }
        
        .login-input { width: 100%; padding: 14px; background: #111; border: 1px solid #222; color: white; margin-bottom: 15px; outline: none; font-family: 'Inter'; font-size: 0.9rem; }
        .login-input:focus { border-color: #4f46e5; }
        .login-label { display: block; font-family: 'Space Mono'; font-size: 0.65rem; color: #666; margin-bottom: 5px; text-transform: uppercase; }

        .policy-box { background: #111; padding: 15px; border-left: 2px solid #4f46e5; margin: 25px 0; font-size: 0.8rem; color: #666; line-height: 1.6; }

        #kabir-bot { position: fixed; bottom: 30px; right: 30px; z-index: 4000; }
        .bot-toggle { background: #4f46e5; color: white; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 10px 30px rgba(79,70,229,0.4); }
        .bot-window { position: absolute; bottom: 75px; right: 0; width: 320px; background: #0a0a0a; border: 1px solid #222; display: none; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .bot-header { background: #111; color: white; padding: 15px; font-weight: 500; font-family: 'Space Mono'; font-size: 0.75rem; border-bottom: 1px solid #222; }
        .bot-body { padding: 20px; font-size: 0.85rem; color: #888; max-height: 250px; overflow-y: auto; }
        .bot-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 8px; border: 1px solid #222; background: #111; color: white; cursor: pointer; font-family: 'Inter'; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .portal-content, .privacy-content { padding: 30px 20px; }
            .hero-main { font-size: 15vw; }
            #kabir-bot { bottom: 20px; right: 20px; }
            .cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
