        // CUSTOM CURSOR
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // MODAL HANDLERS (Exactly like 5 AM logic)
        function openPortal() {
            const modal = document.getElementById('portalModal');
            modal.classList.add('active'); 
            const savedData = sessionStorage.getItem('icebug_user');
            if (savedData) showDashboard(JSON.parse(savedData));
        }

        function closePortal() {
            document.getElementById('portalModal').classList.remove('active');
        }

        function openPrivacy() {
            document.getElementById('privacyModal').classList.add('active');
        }

        function closePrivacy() {
            document.getElementById('privacyModal').classList.remove('active');
        }

        function openSOW(link, title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('sowFrame').src = link;
            document.getElementById('sowModal').classList.add('active');
        }

        function closeSOW() {
            document.getElementById('sowModal').classList.remove('active');
            document.getElementById('sowFrame').src = '';
        }

        // LOGIN LOGIC
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const phone = document.getElementById('login-phone').value.trim();
            const { data, error } = await _supabase.from('subscriptions').select('*').eq("Email_Id", email).eq('Phone_Number', phone).single();

            if (data) {
                sessionStorage.setItem('icebug_user', JSON.stringify(data));
                showDashboard(data);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function showDashboard(data) {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('client-name-display').innerText = data.Client_Name || "CLIENT";
            
            // EMAIL & PHONE DISPLAY (ADDED BACK)
            document.getElementById('client-email').innerText = data.Email_Id || "NOT PROVIDED";
            document.getElementById('client-phone').innerText = data.Phone_Number || "NOT PROVIDED";
            document.getElementById('expiry-date').innerText = data.Expiry_Date || "--/--/----";

            const setupEl = document.getElementById('setup-paid');
            const finalEl = document.getElementById('final-paid');
            setupEl.innerText = data.Setup_Status || "PENDING ⏳";
            setupEl.style.color = data.Setup_Status === "PAID ✅" ? "#16a34a" : "#f59e0b";
            finalEl.innerText = data.Final_Status || "PENDING ⏳";
            finalEl.style.color = data.Final_Status === "PAID ✅" ? "#16a34a" : "#f59e0b";
        }

        function logout() {
            sessionStorage.removeItem('icebug_user');
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('dashboard-view').style.display = 'none';
        }

        function handlePayment() {
            const plan = document.getElementById('plan-name').innerText;
            if (plan.includes("Bespoke")) window.location.href = "https://rzp.io/rzp/g8movGN";
            else if (plan.includes("Premium")) window.location.href = "https://rzp.io/rzp/tQ5dw83H";
            else window.location.href = "https://rzp.io/rzp/uQQlcFu";
        }

        function toggleBot() {
            const win = document.getElementById('botWindow');
            win.style.display = win.style.display === 'block' ? 'none' : 'block';
        }

        function botReply(type) {
            const body = document.getElementById('botBody');
            if(type === 'refund') body.innerHTML += `<p style="color:#4f46e5; margin-top:10px;"><b>KABIR:</b> Our refund policy is strictly non-refundable.</p>`;
            else if(type === 'cancel') body.innerHTML += `<p style="color:#4f46e5; margin-top:10px;"><b>KABIR:</b> Cancel via dashboard button.</p>`;
            body.scrollTop = body.scrollHeight;
        }
    </script>
